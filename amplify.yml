version: 1.0
frontend:
  phases:
    preBuild:
      commands:
        - echo "Using custom Docker image for build"
        - docker pull anrajiv/demo-frontend-resume-two:latest
    build:
      commands:  
        - docker run -d -p 3000:3000 anrajiv/demo-frontend-resume-two:latest
        - docker ps
  artifacts:
    baseDirectory: /usr/src/app/.next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*

