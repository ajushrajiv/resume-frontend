version: 1.0
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20  
        - nvm use 20      
        - node --version  
        - npm ci 
    build:
      commands:
        - npm run build  
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'  
  cache:
    paths:
      - node_modules/**/*  
